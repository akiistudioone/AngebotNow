<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Socrates — Erkenntnisse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon.svg">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/orb.css">
  <link rel="stylesheet" href="css/app.css">
  <script>
    window.SOCRATES_CONFIG = {
      supabaseUrl: '%%SUPABASE_URL%%',
      supabaseAnonKey: '%%SUPABASE_ANON_KEY%%',
      stripeCheckoutUrl: '%%STRIPE_CHECKOUT_URL%%',
    };
  </script>
</head>
<body>

<div class="app-shell" id="insights-main">

  <header class="app-header">
    <span></span>
    <span class="app-header-logo">Socrates</span>
    <span></span>
  </header>

  <main class="app-main">

    <div class="tabs">
      <button class="tab-btn active" data-tab="erkenntnisse">Erkenntnisse</button>
      <button class="tab-btn" data-tab="weisheiten">Weisheiten</button>
      <button class="tab-btn" data-tab="woche">Diese Woche</button>
      <button class="tab-btn" data-tab="muster">Muster</button>
      <button class="tab-btn" data-tab="verlauf">Verlauf</button>
    </div>

    <!-- Tab: Erkenntnisse -->
    <div class="tab-panel active" id="tab-erkenntnisse">
      <div style="display:flex;gap:var(--space-1);margin-bottom:var(--space-3)">
        <button class="btn btn-sm btn-ghost filter-btn active" data-filter="all">Alle</button>
        <button class="btn btn-sm btn-ghost filter-btn" data-filter="starred">★ Favoriten</button>
      </div>
      <div id="insights-list">
        <div class="empty-state"><div class="spinner" style="margin:0 auto"></div></div>
      </div>
    </div>

    <!-- Tab: Weisheiten (Daily Quotes) -->
    <div class="tab-panel" id="tab-weisheiten">
      <p class="text-small text-muted" style="margin-bottom:var(--space-3);line-height:1.6">
        Deine erarbeiteten Weisheiten — ein Einzeiler aus jeder abgeschlossenen Session.
      </p>
      <div id="quotes-list">
        <div class="empty-state"><div class="spinner" style="margin:0 auto"></div></div>
      </div>
    </div>

    <!-- Tab: Diese Woche -->
    <div class="tab-panel" id="tab-woche">
      <div id="weekly-digest-content">
        <div class="empty-state"><div class="spinner" style="margin:0 auto"></div></div>
      </div>
    </div>

    <!-- Tab: Muster -->
    <div class="tab-panel" id="tab-muster">
      <div id="patterns-list">
        <div class="empty-state"><div class="spinner" style="margin:0 auto"></div></div>
      </div>
    </div>

    <!-- Tab: Verlauf -->
    <div class="tab-panel" id="tab-verlauf">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--space-2);margin-bottom:var(--space-3)">
        <div class="card" style="text-align:center;padding:var(--space-2)">
          <p class="text-display" style="font-size:1.8rem" id="stat-streak">—</p>
          <p class="text-small text-muted">Streak</p>
        </div>
        <div class="card" style="text-align:center;padding:var(--space-2)">
          <p class="text-display" style="font-size:1.8rem" id="stat-total">—</p>
          <p class="text-small text-muted">Sessions</p>
        </div>
        <div class="card" style="text-align:center;padding:var(--space-2)">
          <p class="text-display" style="font-size:1.8rem" id="stat-energy">—</p>
          <p class="text-small text-muted">Energie</p>
        </div>
      </div>

      <div style="margin-bottom:var(--space-3)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-2)">
          <button class="btn-icon" id="cal-prev">‹</button>
          <p class="text-small text-secondary" id="cal-month-label"></p>
          <button class="btn-icon" id="cal-next">›</button>
        </div>
        <div id="calendar-container"></div>
      </div>

      <div>
        <p class="text-small text-muted" style="margin-bottom:var(--space-1)">Orb-Energie Verlauf</p>
        <div id="energy-chart-container">
          <p class="text-muted text-small">Nicht genug Daten.</p>
        </div>
      </div>
    </div>

  </main>

  <nav class="bottom-nav" aria-label="Hauptnavigation">
    <a href="app.html" class="nav-item" id="nav-today">
      <span class="nav-icon">◎</span>
      <span class="nav-label">Heute</span>
    </a>
    <a href="insights.html" class="nav-item active" id="nav-insights">
      <span class="nav-icon">◇</span>
      <span class="nav-label">Erkenntnisse</span>
    </a>
    <a href="settings.html" class="nav-item" id="nav-settings">
      <span class="nav-icon">◱</span>
      <span class="nav-label">Einstellungen</span>
    </a>
  </nav>

</div>

<script type="module">
  import { guardRoute }               from './js/router.js';
  import {
    loadAndRenderInsights, renderInsightCard, handleStarToggle,
    loadAndRenderPatterns, renderPatternCard,
    renderCalendar, renderEnergyChart, getStreakInfo,
  }                                   from './js/insights.js';
  import { acknowledgePattern }       from './js/supabase.js';
  import { showToast, initPage }      from './js/app.js';
  import { nativeShareInsight }       from './js/share.js';
  import {
    isPremium, canViewPatterns, canViewWeeklyDigest,
    showUpgradeModal, renderLockedFeature,
  }                                   from './js/premium.js';

  const ctx = await guardRoute();
  if (ctx) initInsights(ctx.user, ctx.profile);

  async function initInsights(user, profile) {
    initPage(document.getElementById('insights-main'));

    // Tabs
    const tabBtns   = document.querySelectorAll('.tab-btn');
    const tabPanels = document.querySelectorAll('.tab-panel');
    let   digestLoaded   = false;
    let   patternsLoaded = false;
    let   verlaufLoaded  = false;
    let   quotesLoaded   = false;

    tabBtns.forEach(btn => {
      btn.addEventListener('click', async () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        tabPanels.forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        const tabId = `tab-${btn.dataset.tab}`;
        document.getElementById(tabId).classList.add('active');

        // Lazy-load
        if (btn.dataset.tab === 'weisheiten' && !quotesLoaded) {
          quotesLoaded = true;
          await loadQuotes(user.id);
        }
        if (btn.dataset.tab === 'woche' && !digestLoaded) {
          digestLoaded = true;
          await loadWeeklyDigest(user.id, profile);
        }
        if (btn.dataset.tab === 'muster' && !patternsLoaded) {
          patternsLoaded = true;
          await loadPatterns(user.id, profile);
        }
        if (btn.dataset.tab === 'verlauf' && !verlaufLoaded) {
          verlaufLoaded = true;
          await loadVerlauf(user.id);
        }
      });
    });

    // Erkenntnisse direkt laden
    await loadInsights(user.id, 'all');

    const filterBtns = document.querySelectorAll('.filter-btn');
    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadInsights(user.id, btn.dataset.filter);
      });
    });
  }

  /* ---- ERKENNTNISSE ---- */

  async function loadInsights(userId, filter) {
    const list = document.getElementById('insights-list');
    list.innerHTML = '<div class="empty-state"><div class="spinner" style="margin:0 auto"></div></div>';

    try {
      const insights = await loadAndRenderInsights(userId, filter);

      if (insights.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">◇</div>
            <p>${filter === 'starred' ? 'Keine Favoriten.' : 'Noch keine Erkenntnisse.'}</p>
          </div>`;
        return;
      }

      // Karten mit Share-Button rendern
      list.innerHTML = insights.map(insight => {
        const card = renderInsightCard(insight);
        const shareBtn = `
          <button class="share-insight-btn btn-subtle"
            data-content="${encodeURIComponent(insight.content)}"
            data-date="${new Date(insight.created_at).toLocaleDateString('de-DE',{day:'numeric',month:'long',year:'numeric'})}"
            style="font-size:0.7rem;padding:4px 8px;color:var(--text-muted)">
            ◱ Teilen
          </button>`;
        return card.replace('</div>', `${shareBtn}</div>`);
      }).join('');

      // Star
      list.querySelectorAll('.star-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const isStarred = btn.classList.contains('starred');
          try {
            await handleStarToggle(btn.dataset.insightId, isStarred);
            btn.classList.toggle('starred');
            btn.textContent = isStarred ? '☆' : '★';
          } catch {
            showToast('Fehler beim Speichern.', 'error');
          }
        });
      });

      // Share
      list.querySelectorAll('.share-insight-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          btn.classList.add('loading');
          btn.disabled = true;
          try {
            const text = decodeURIComponent(btn.dataset.content);
            await nativeShareInsight(text, btn.dataset.date);
          } catch {
            showToast('Teilen fehlgeschlagen.', 'error');
          } finally {
            btn.classList.remove('loading');
            btn.disabled = false;
          }
        });
      });

    } catch {
      list.innerHTML = '<div class="empty-state"><p>Fehler beim Laden.</p></div>';
    }
  }

  /* ---- WEISHEITEN (Daily Quotes) ---- */

  async function loadQuotes(userId) {
    const list = document.getElementById('quotes-list');
    try {
      const { supabase } = await import('./js/supabase.js');
      const { data: sessions } = await supabase
        .from('sessions')
        .select('daily_quote, date, created_at')
        .eq('user_id', userId)
        .eq('completed', true)
        .not('daily_quote', 'is', null)
        .order('created_at', { ascending: false });

      if (!sessions || sessions.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">◈</div>
            <p>Noch keine Weisheiten. Schließe deine erste Session ab, um deinen ersten Spruch zu erhalten.</p>
          </div>`;
        return;
      }

      list.innerHTML = sessions.map(s => {
        const date = new Date(s.date || s.created_at).toLocaleDateString('de-DE', {
          day: 'numeric', month: 'long', year: 'numeric'
        });
        return `
          <div class="card" style="margin-bottom:var(--space-2);position:relative">
            <p class="text-upper text-muted" style="font-size:0.65rem;margin-bottom:var(--space-1)">${date}</p>
            <p style="
              font-family:var(--font-display);
              font-style:italic;
              font-size:1.05rem;
              line-height:1.7;
              color:var(--accent-gold);
              letter-spacing:0.01em;
            ">${s.daily_quote}</p>
          </div>`;
      }).join('');
    } catch {
      list.innerHTML = '<div class="empty-state"><p>Fehler beim Laden.</p></div>';
    }
  }

  /* ---- DIESE WOCHE (Weekly Digest) ---- */

  async function loadWeeklyDigest(userId, profile) {
    const container = document.getElementById('weekly-digest-content');

    if (!canViewWeeklyDigest(profile)) {
      container.innerHTML = renderLockedFeature('digest');
      container.querySelector('#unlock-btn')?.addEventListener('click', () =>
        showUpgradeModal('digest')
      );
      return;
    }

    try {
      const { supabase } = await import('./js/supabase.js');
      const { data: digests } = await supabase
        .from('weekly_digests')
        .select('*')
        .eq('user_id', userId)
        .order('week_start', { ascending: false })
        .limit(4);

      if (!digests || digests.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">◑</div>
            <p>Noch keine wöchentliche Zusammenfassung. Kommt nach deiner ersten Woche.</p>
          </div>`;
        return;
      }

      container.innerHTML = digests.map(d => _renderDigestCard(d)).join('');
    } catch {
      container.innerHTML = '<div class="empty-state"><p>Fehler beim Laden.</p></div>';
    }
  }

  function _renderDigestCard(digest) {
    const from = new Date(digest.week_start).toLocaleDateString('de-DE',{day:'numeric',month:'short'});
    const to   = new Date(digest.week_end).toLocaleDateString('de-DE',{day:'numeric',month:'short'});
    const themes = (digest.key_themes || []).map(t =>
      `<span style="
        display:inline-block;padding:3px 10px;
        background:rgba(201,169,110,0.1);border:1px solid rgba(201,169,110,0.2);
        border-radius:100px;font-size:0.72rem;color:var(--accent-gold);
        margin:3px 4px 3px 0;
      ">${t}</span>`
    ).join('');

    return `
      <div class="card" style="margin-bottom:var(--space-2)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-2)">
          <p class="text-upper text-muted">${from} — ${to}</p>
          <span class="badge badge-gold">${digest.session_count} Sessions</span>
        </div>
        <p style="font-family:var(--font-display);font-style:italic;font-size:1rem;line-height:1.7;color:var(--text-primary);margin-bottom:var(--space-2)">
          ${digest.summary || ''}
        </p>
        ${themes ? `<div style="margin-bottom:var(--space-2)">${themes}</div>` : ''}
        ${digest.growth_noted ? `
          <div style="border-top:1px solid var(--border);padding-top:var(--space-1);margin-top:var(--space-1)">
            <p class="text-small text-muted" style="margin-bottom:4px">Wachstum</p>
            <p style="font-size:0.875rem;color:var(--text-secondary);line-height:1.6">${digest.growth_noted}</p>
          </div>` : ''}
      </div>`;
  }

  /* ---- MUSTER ---- */

  async function loadPatterns(userId, profile) {
    const list = document.getElementById('patterns-list');

    if (!canViewPatterns(profile)) {
      list.innerHTML = renderLockedFeature('patterns');
      list.querySelector('#unlock-btn')?.addEventListener('click', () =>
        showUpgradeModal('patterns')
      );
      return;
    }

    list.innerHTML = '<div class="empty-state"><div class="spinner" style="margin:0 auto"></div></div>';

    try {
      const patterns = await loadAndRenderPatterns(userId);

      if (patterns.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">◐</div>
            <p>Noch keine Muster erkannt. Muster werden nach 5 Sessions sichtbar.</p>
          </div>`;
        return;
      }

      list.innerHTML = patterns.map(p => renderPatternCard(p)).join('');

      patterns.filter(p => !p.acknowledged).forEach(async (p) => {
        try { await acknowledgePattern(p.id); } catch {}
      });
    } catch {
      list.innerHTML = '<div class="empty-state"><p>Fehler beim Laden.</p></div>';
    }
  }

  /* ---- VERLAUF ---- */

  async function loadVerlauf(userId) {
    try {
      const info = await getStreakInfo(userId);
      document.getElementById('stat-streak').textContent  = `${info.streak}🔥`;
      document.getElementById('stat-total').textContent   = info.totalSessions;
      document.getElementById('stat-energy').textContent  = `${Math.round(info.orbEnergy * 100)}%`;
    } catch {}

    const now = new Date();
    let year  = now.getFullYear();
    let month = now.getMonth() + 1;

    const monthNames = ['Januar','Februar','März','April','Mai','Juni',
                        'Juli','August','September','Oktober','November','Dezember'];

    async function renderCal() {
      document.getElementById('cal-month-label').textContent = `${monthNames[month - 1]} ${year}`;
      document.getElementById('calendar-container').innerHTML =
        await renderCalendar(userId, year, month);
    }

    await renderCal();

    document.getElementById('cal-prev').addEventListener('click', async () => {
      month--; if (month < 1) { month = 12; year--; } await renderCal();
    });
    document.getElementById('cal-next').addEventListener('click', async () => {
      month++; if (month > 12) { month = 1; year++; } await renderCal();
    });

    try {
      const chartHtml = await renderEnergyChart(userId);
      if (chartHtml) document.getElementById('energy-chart-container').innerHTML = chartHtml;
    } catch {}
  }
</script>

</body>
</html>
