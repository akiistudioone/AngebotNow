<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Socrates — Reflexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/orb.css">
  <link rel="stylesheet" href="css/app.css">
  <script>
    window.SOCRATES_CONFIG = {
      supabaseUrl: '%%SUPABASE_URL%%',
      supabaseAnonKey: '%%SUPABASE_ANON_KEY%%',
      stripeCheckoutUrl: '%%STRIPE_CHECKOUT_URL%%',
    };
  </script>
</head>
<body>

<div class="reflection-shell" id="reflection-main">

  <header class="reflection-header">
    <button class="reflection-back btn-subtle" id="back-btn">← Zurück</button>
    <span class="reflection-phase" id="phase-label">Phase 1 / 4</span>
    <span></span>
  </header>

  <div class="reflection-progress">
    <div class="progress-bar" style="height:2px">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Phase 1: Fragen -->
  <div id="phase-questions" class="reflection-main">
    <div class="question-container">
      <!-- Resume-Badge -->
      <div id="resume-badge" style="display:none;margin-bottom:var(--space-2)">
        <span class="badge badge-gold">◑ Fortgesetzt</span>
      </div>
      <p class="question-number" id="question-number">Frage 1 von 4</p>
      <h2 class="question-text" id="question-text"></h2>
      <div class="question-answer-wrap">
        <textarea
          class="input textarea textarea-lg"
          id="answer-input"
          placeholder="Schreib ehrlich, was dir in den Sinn kommt..."
          rows="6"
        ></textarea>
        <span class="char-count" id="char-count">0</span>
      </div>
      <div class="question-continue">
        <button class="btn btn-primary btn-full" id="continue-btn" disabled>
          Weiter
        </button>
      </div>
    </div>
  </div>

  <!-- Phase 2: Dialog -->
  <div id="phase-dialog" style="display:none;flex-direction:column;flex:1">

    <div style="padding:var(--space-1) var(--space-3);border-bottom:1px solid var(--border);display:flex;justify-content:flex-end">
      <button class="aha-btn" id="aha-btn">◈ AHA-Moment markieren</button>
    </div>

    <div class="dialog-container" id="dialog-container"></div>

    <div class="dialog-input-area">
      <div class="dialog-input-row">
        <textarea
          class="dialog-textarea"
          id="dialog-input"
          placeholder="Deine Antwort..."
          rows="1"
        ></textarea>
        <button class="dialog-send-btn" id="dialog-send" disabled>↑</button>
      </div>
    </div>
  </div>

  <!-- Phase 3: Abschluss -->
  <div id="phase-closing" style="display:none;flex:1;overflow-y:auto">
    <div class="closing-screen">

      <div class="closing-orb-wrap">
        <div class="orb-container" id="closing-orb" style="min-height:180px;flex:none"></div>
      </div>

      <div>
        <h2 class="closing-title">Tiefe erreicht.</h2>
        <p class="text-secondary" style="margin-top:8px;font-size:0.9rem">
          Du hast dich heute wirklich hingeschaut.
        </p>
      </div>

      <div class="closing-insight-block">
        <p class="closing-insight-label">Deine Erkenntnis heute</p>
        <p class="closing-insight-text" id="closing-insight-text"></p>
      </div>

      <div class="closing-exercise">
        <p class="closing-exercise-label">Übung für morgen</p>
        <p class="closing-exercise-text" id="closing-exercise-text"></p>
      </div>

      <!-- Share + Done Buttons -->
      <div style="display:flex;flex-direction:column;gap:var(--space-2);width:100%">
        <button class="btn btn-ghost btn-full" id="share-insight-btn">
          ◱ Erkenntnis teilen
        </button>
        <button class="btn btn-primary btn-full" id="closing-done-btn">
          Zur App
        </button>
      </div>

    </div>
  </div>

</div>

<!-- Reconnect Overlay (Gemini Verbindung weg) -->
<div id="reconnect-overlay" style="
  display:none;position:fixed;inset:0;
  background:rgba(8,8,8,0.96);backdrop-filter:blur(8px);
  z-index:500;flex-direction:column;align-items:center;
  justify-content:center;gap:var(--space-3);text-align:center;
  padding:var(--space-5);
">
  <div style="font-size:1.8rem;opacity:0.4">◐</div>
  <h3 style="font-family:var(--font-display);font-weight:300;font-size:1.4rem">
    Verbindung unterbrochen
  </h3>
  <p style="color:var(--text-secondary);font-size:0.9rem;max-width:280px;line-height:1.6">
    Dein Gespräch ist gespeichert.<br>Verbinde erneut, um weiterzumachen.
  </p>
  <button class="btn btn-primary" id="reconnect-btn">Erneut verbinden</button>
  <button class="btn btn-subtle" id="reconnect-exit-btn">Session beenden</button>
</div>

<!-- AHA Modal -->
<div class="modal-overlay" id="aha-modal">
  <div class="modal" role="dialog">
    <h3 class="modal-title">AHA-Moment</h3>
    <p style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:var(--space-2)">
      Was hast du gerade erkannt?
    </p>
    <textarea class="input textarea" id="aha-input" placeholder="Ich habe erkannt, dass..." rows="4"></textarea>
    <div style="display:flex;gap:var(--space-2);margin-top:var(--space-3)">
      <button class="btn btn-ghost btn-sm" id="aha-cancel">Abbrechen</button>
      <button class="btn btn-primary btn-sm" id="aha-save">Speichern</button>
    </div>
  </div>
</div>

<script type="module">
  import { guardRoute, navigate }         from './js/router.js';
  import { ReflectionManager, loadRecentSessions } from './js/session.js';
  import { Orb }                          from './js/orb.js';
  import { GeminiConnectionError }        from './js/gemini.js';
  import {
    showToast, openModal, closeModal,
    autoResizeTextarea, scrollToBottom,
    sanitizeText, initPage,
  }                                       from './js/app.js';
  import { escapeHtml }                   from './js/insights.js';
  import { canStartNewSession, showUpgradeModal } from './js/premium.js';
  import { nativeShareInsight }           from './js/share.js';

  const ctx = await guardRoute();
  if (ctx) initReflection(ctx.user, ctx.profile);

  async function initReflection(user, profile) {
    initPage(document.getElementById('reflection-main'));

    // Premium-Gate: Kann der User überhaupt starten?
    if (!canStartNewSession(profile)) {
      showUpgradeModal('session_limit');
      setTimeout(() => navigate('app'), 300);
      return;
    }

    const manager = new ReflectionManager();
    const { ok, isResuming, resumePhase } = await manager.init();
    if (!ok) return;

    /* ============ PHASE 1: FRAGEN ============ */

    let currentQ   = isResuming ? manager.getResumeQuestionIndex() : 0;
    const totalQ   = manager.getTotalQuestions();

    const questionText  = document.getElementById('question-text');
    const answerInput   = document.getElementById('answer-input');
    const continueBtn   = document.getElementById('continue-btn');
    const questionNumber = document.getElementById('question-number');
    const progressFill  = document.getElementById('progress-fill');
    const charCount     = document.getElementById('char-count');
    const phaseLabel    = document.getElementById('phase-label');

    // Resume Badge
    if (isResuming) {
      document.getElementById('resume-badge').style.display = 'block';
    }

    // Wenn alle 4 Fragen schon beantwortet → direkt zum Dialog
    if (resumePhase === 'dialog' || resumePhase === 'dialog_start') {
      await transitionToDialog(resumePhase === 'dialog');
    } else {
      showQuestion(currentQ);
    }

    function showQuestion(index) {
      const q = manager.getQuestion(index);
      if (!q) return;

      questionText.classList.remove('fade-in-up');
      void questionText.offsetWidth;
      questionText.classList.add('fade-in-up');

      questionText.textContent = q.text;
      questionNumber.textContent = `Frage ${index + 1} von ${totalQ}`;
      phaseLabel.textContent     = `Phase ${index + 1} / ${totalQ}`;
      progressFill.style.width   = `${(index / totalQ) * 60}%`;

      // Bei Resume: vorherige Antwort vorladen
      const prevAnswer = manager.answers[q.key] || '';
      answerInput.value = prevAnswer;
      continueBtn.disabled = prevAnswer.length < 20;
      charCount.textContent = prevAnswer.length;
      charCount.style.color = prevAnswer.length >= 20
        ? 'var(--accent-gold-dim)' : 'var(--text-muted)';

      if (!prevAnswer) answerInput.focus();
    }

    answerInput.addEventListener('input', () => {
      const len = answerInput.value.length;
      charCount.textContent = len;
      continueBtn.disabled  = len < 20;
      charCount.style.color = len >= 20 ? 'var(--accent-gold-dim)' : 'var(--text-muted)';
    });

    continueBtn.addEventListener('click', async () => {
      const answer = sanitizeText(answerInput.value);
      continueBtn.classList.add('loading');
      continueBtn.disabled = true;

      try {
        await manager.saveAnswer(currentQ, answer);

        if (manager.isLastQuestion()) {
          await transitionToDialog(false);
        } else {
          currentQ++;
          showQuestion(currentQ);
        }
      } catch {
        showToast('Fehler beim Speichern.', 'error');
      } finally {
        continueBtn.classList.remove('loading');
        continueBtn.disabled = false;
      }
    });

    document.getElementById('back-btn').addEventListener('click', () => {
      if (confirm('Session verlassen? Deine Antworten werden gespeichert.')) {
        navigate('app');
      }
    });

    /* ============ PHASE 2: DIALOG ============ */

    let dialogOrb   = null;
    let isSending   = false;

    async function transitionToDialog(hasExistingHistory = false) {
      progressFill.style.width = '60%';
      phaseLabel.textContent   = 'Sokratischer Dialog';

      document.getElementById('phase-questions').style.display = 'none';
      const dialogPhase = document.getElementById('phase-dialog');
      dialogPhase.style.display       = 'flex';
      dialogPhase.style.flexDirection = 'column';
      dialogPhase.style.flex          = '1';

      const dialogContainer = document.getElementById('dialog-container');

      try {
        const prevSessions = await loadRecentSessions(user.id);
        const openingReply = await manager.startDialog(prevSessions);

        if (openingReply === null && hasExistingHistory) {
          // History aus sessionStorage wiederhergestellt → Dialog neu aufbauen
          const log = manager.getRestoredDialogLog();
          log.forEach(entry => {
            if (entry.role === 'socrates') appendSocratesMessage(dialogContainer, entry.text);
            else                           appendUserMessage(dialogContainer, entry.text);
          });
          scrollToBottom(dialogContainer);
        } else if (openingReply) {
          appendSocratesMessage(dialogContainer, openingReply);
        }
      } catch (err) {
        hideTyping(dialogContainer);
        handleGeminiError(err, () => transitionToDialog(hasExistingHistory));
        return;
      }

      setupDialogInput();
    }

    function setupDialogInput() {
      const dialogInput = document.getElementById('dialog-input');
      const dialogSend  = document.getElementById('dialog-send');
      const dialogContainer = document.getElementById('dialog-container');

      autoResizeTextarea(dialogInput);

      dialogInput.addEventListener('input', () => {
        dialogSend.disabled = dialogInput.value.trim().length === 0;
      });

      dialogInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey && !dialogSend.disabled) {
          e.preventDefault();
          dialogSend.click();
        }
      });

      dialogSend.addEventListener('click', async () => {
        if (isSending) return;
        const text = sanitizeText(dialogInput.value);
        if (!text) return;

        isSending = true;
        dialogInput.value = '';
        dialogSend.disabled = true;
        dialogInput.style.height = 'auto';

        appendUserMessage(dialogContainer, text);
        scrollToBottom(dialogContainer);

        const isClosingInput = manager.isClosingTriggered() && manager.isReadyToClose();

        showTyping(dialogContainer);
        scrollToBottom(dialogContainer);

        try {
          if (isClosingInput) {
            hideTyping(dialogContainer);
            await transitionToClosing(text);
          } else {
            const reply = await manager.sendUserMessage(text);
            hideTyping(dialogContainer);
            if (reply) {
              appendSocratesMessage(dialogContainer, reply);
              if (manager.isClosingTriggered() && manager.isReadyToClose()) {
                progressFill.style.width = '85%';
              }
            }
          }
        } catch (err) {
          hideTyping(dialogContainer);
          handleGeminiError(err, null);
          // User-Eingabe zurücksetzen damit sie erneut gesendet werden kann
          dialogInput.value = text;
          dialogSend.disabled = false;
        } finally {
          isSending = false;
          scrollToBottom(dialogContainer);
        }
      });
    }

    /* ============ RECONNECT OVERLAY ============ */

    function handleGeminiError(err, retryFn) {
      const overlay = document.getElementById('reconnect-overlay');
      overlay.style.display = 'flex';

      const reconnectBtn  = document.getElementById('reconnect-btn');
      const exitBtn       = document.getElementById('reconnect-exit-btn');

      // Fehlermeldung anpassen
      const msgEl = overlay.querySelector('p');
      if (err?.name === 'GeminiConnectionError') {
        msgEl.innerHTML = `${err.message}<br><span style="font-size:0.8rem;color:var(--text-muted)">Dein Gespräch ist gespeichert.</span>`;
      }

      reconnectBtn.onclick = () => {
        overlay.style.display = 'none';
        if (retryFn) retryFn();
      };

      exitBtn.onclick = () => {
        overlay.style.display = 'none';
        navigate('app');
      };
    }

    /* ============ PHASE 3: ABSCHLUSS ============ */

    let closingInsightText = '';

    async function transitionToClosing(finalResponse) {
      progressFill.style.width = '90%';

      try {
        const closing = await manager.finishSession(finalResponse);

        document.getElementById('phase-dialog').style.display = 'none';
        const closingPhase = document.getElementById('phase-closing');
        closingPhase.style.display = 'block';
        phaseLabel.textContent     = 'Abschluss';
        progressFill.style.width   = '100%';

        dialogOrb = new Orb('#closing-orb');
        dialogOrb.setEnergy(1.0);
        setTimeout(() => dialogOrb.flash(), 500);

        closingInsightText = closing.closing_insight || '';
        document.getElementById('closing-insight-text').textContent = closingInsightText;
        document.getElementById('closing-exercise-text').textContent =
          closing.exercise_tomorrow || '';

        document.getElementById('closing-done-btn').addEventListener('click', () => {
          navigate('app');
        });

        // Share-Button
        document.getElementById('share-insight-btn').addEventListener('click', async () => {
          const shareBtn = document.getElementById('share-insight-btn');
          shareBtn.classList.add('loading');
          shareBtn.disabled = true;
          try {
            const dateLabel = new Date().toLocaleDateString('de-DE', {
              day: 'numeric', month: 'long', year: 'numeric',
            });
            await nativeShareInsight(closingInsightText, dateLabel);
          } catch {
            showToast('Teilen fehlgeschlagen.', 'error');
          } finally {
            shareBtn.classList.remove('loading');
            shareBtn.disabled = false;
          }
        });

      } catch (err) {
        handleGeminiError(err, () => transitionToClosing(finalResponse));
      }
    }

    /* ============ AHA MODAL ============ */

    const ahaModal = document.getElementById('aha-modal');
    const ahaInput = document.getElementById('aha-input');

    document.getElementById('aha-btn').addEventListener('click', () => {
      ahaInput.value = '';
      openModal(ahaModal);
      ahaInput.focus();
    });

    document.getElementById('aha-cancel').addEventListener('click', () => closeModal(ahaModal));
    ahaModal.addEventListener('click', (e) => { if (e.target === ahaModal) closeModal(ahaModal); });

    document.getElementById('aha-save').addEventListener('click', async () => {
      const content = sanitizeText(ahaInput.value);
      if (!content) return;
      const saveBtn = document.getElementById('aha-save');
      saveBtn.classList.add('loading');
      saveBtn.disabled = true;
      try {
        await manager.markAhaMoment(content);
        closeModal(ahaModal);
        dialogOrb?.flash();
        showToast('AHA-Moment gespeichert ✓', 'success');
      } catch {
        showToast('Fehler beim Speichern.', 'error');
      } finally {
        saveBtn.classList.remove('loading');
        saveBtn.disabled = false;
      }
    });

    /* ============ DIALOG HELPERS ============ */

    function appendSocratesMessage(container, text) {
      const div = document.createElement('div');
      div.className = 'dialog-message socrates fade-in-up';
      div.innerHTML = `<p class="dialog-sender">Socrates</p><p class="dialog-text">${escapeHtml(text)}</p>`;
      container.appendChild(div);
      scrollToBottom(container);
    }

    function appendUserMessage(container, text) {
      const div = document.createElement('div');
      div.className = 'dialog-message user fade-in-up';
      div.innerHTML = `<p class="dialog-sender">Du</p><p class="dialog-text">${escapeHtml(text)}</p>`;
      container.appendChild(div);
    }

    let typingEl = null;

    function showTyping(container) {
      typingEl = document.createElement('div');
      typingEl.className = 'dialog-message socrates';
      typingEl.innerHTML = `
        <div class="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>`;
      container.appendChild(typingEl);
    }

    function hideTyping() {
      typingEl?.remove();
      typingEl = null;
    }
  }
</script>

</body>
</html>
