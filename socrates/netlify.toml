# ============================================================
# SOCRATES — NETLIFY CONFIGURATION
# ============================================================

[build]
  base      = "socrates"
  publish   = "."
  functions = "netlify/functions"
  command   = "bash build.sh"

# Environment Variables (in Netlify UI setzen)
[build.environment]
  NODE_VERSION = "18"

# Redirects
[[redirects]]
  from = "/app"
  to   = "/app.html"
  status = 200

[[redirects]]
  from = "/reflect"
  to   = "/reflection.html"
  status = 200

[[redirects]]
  from = "/insights"
  to   = "/insights.html"
  status = 200

[[redirects]]
  from = "/settings"
  to   = "/settings.html"
  status = 200

[[redirects]]
  from = "/onboarding"
  to   = "/onboarding.html"
  status = 200

[[redirects]]
  from = "/funnel"
  to   = "/funnel.html"
  status = 200

# Auth Callback
[[redirects]]
  from = "/auth/callback"
  to   = "/app.html"
  status = 200

# ---- SECURITY HEADERS ----
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data: blob:; worker-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Functions
[functions]
  node_bundler = "esbuild"

# Scheduled Functions
[functions."weekly-digest"]
  schedule = "0 20 * * 0"   # Sonntag 20:00 UTC

[functions."push-notify"]
  schedule = "0 * * * *"    # Jede volle Stunde UTC

# Dev-Server
[dev]
  port = 8888
  publish = "."
  functions = "netlify/functions"
