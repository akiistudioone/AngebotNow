<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <radialGradient id="orbCore" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#f5e4b0"/>
      <stop offset="35%" stop-color="#c9a96e"/>
      <stop offset="75%" stop-color="#9a7540"/>
      <stop offset="100%" stop-color="#6b4f22"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="55%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(201,169,110,0.08)"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Outer halo ring -->
  <circle cx="256" cy="256" r="185" fill="url(#halo)"/>

  <!-- Halo ring line -->
  <circle cx="256" cy="256" r="185" fill="none"
          stroke="rgba(201,169,110,0.12)" stroke-width="1"/>

  <!-- Orb glow -->
  <circle cx="256" cy="256" r="120" fill="rgba(201,169,110,0.06)" filter="url(#glow)"/>

  <!-- Main orb -->
  <circle cx="256" cy="256" r="108" fill="url(#orbCore)"/>

  <!-- Sheen highlight -->
  <ellipse cx="222" cy="210" rx="42" ry="28"
           fill="rgba(255,255,255,0.18)"
           transform="rotate(-20 222 210)"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="108" fill="none"
          stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
</svg>
