[build]
  publish = "."
  functions = "netlify/functions"
  command = "sed -i \"s|https://YOUR_PROJECT.supabase.co|$SUPABASE_URL|g; s|YOUR_SUPABASE_ANON_KEY|$SUPABASE_ANON_KEY|g\" app.js"

[build.environment]
  NODE_VERSION = "18"

# ── Environment variable hints ────────────────────────────────────────────────
# Required in Netlify UI → Site settings → Environment variables:
#   SUPABASE_URL               Your Supabase project URL
#   SUPABASE_ANON_KEY          Supabase anon/public key (injected into index.html)
#   SUPABASE_KEY               Supabase service role key (backend functions only)
#   STRIPE_SECRET_KEY          Stripe secret key
#   STRIPE_MONTHLY_PRICE_ID    Stripe price ID for monthly plan
#   STRIPE_YEARLY_PRICE_ID     Stripe price ID for yearly plan
#   STRIPE_WEBHOOK_SECRET      Stripe webhook signing secret
#   RESEND_API_KEY             Resend API key for email delivery
#   ALLOWED_ORIGIN             Primary domain, e.g. https://angebotgo.de
#   APP_URL                    Same as ALLOWED_ORIGIN (used for Stripe redirect URLs)
# ─────────────────────────────────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self)"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://js.stripe.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.resend.com https://api.stripe.com https://*.supabase.co https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; frame-src https://js.stripe.com; object-src 'none'; base-uri 'self'; form-action 'self'"
    Access-Control-Allow-Origin = "https://angebotgo.de"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

[[headers]]
  for = "/netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://angebotgo.de"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, stripe-signature"

# ── Redirect HTTP → HTTPS and www → apex ─────────────────────────────────────
[[redirects]]
  from = "http://angebotgo.de/*"
  to = "https://angebotgo.de/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.angebotgo.de/*"
  to = "https://angebotgo.de/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.angebotgo.de/*"
  to = "https://angebotgo.de/:splat"
  status = 301
  force = true

[functions]
  node_bundler = "esbuild"
